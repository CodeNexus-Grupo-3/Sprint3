services:
  mysql:
    build: ./mysql
    image: mysql-codenexus
    restart: always
    volumes:
      - mysql_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: urubu100
      MYSQL_DATABASE: codenexus
      MYSQL_USER: app
      MYSQL_PASSWORD: nexus100
    ports:
      - "3306:3306"
    networks:
      - network-codenexus
    
  python:
    build: ./simbiose
    image: python-codenexus
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - mysql
    env_file:
      - ./simbiose/.env
    networks:
      - network-codenexus

  java:
    build: ./jar
    image: java-codenexus
    env_file:
      - ./jar/.env
    networks:
      - network-codenexus

  app:
    build: ./web-data-viz
    image: app-codenexus
    restart: always
    ports:
      - "3333:3333"
    depends_on:
      - mysql
      - python
    env_file:
      - ./web-data-viz/.env
    networks:
      - network-codenexus

volumes:
  mysql_data:

networks:
  network-codenexus:
    name: network-codenexus