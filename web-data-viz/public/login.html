<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Goldman:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="assets/logo_codenexus_sem_fundo.png" type="image/png">

    <link rel="stylesheet" href="./css/login.css">

    <title>Login | CodeNexus</title>
</head>

<body class="body_login">

    <header>

        <div id="container_home">
            <a href="./index.html">
                <img src="./assets/Home.png" alt="Home">
            </a>
        </div>

        <div id="container_botoes_navbar">

            <a href="./index.html">Início</a>
            <a href="./index.html#container_quem_somos">Sobre</a>
            <a href="./index.html#container_footer">Contato</a>

            <button onclick="window.location.href='./login.html'">
                Login
            </button>

        </div>

    </header>


    <main id="container_login">

        <section id="login_imagem"></section>

        <section id="login_formulario">

            <div id="faixa_login"></div>

            <div id="conteudo_login">

                <h1>
                    BEM-VINDO<br>
                    DE VOLTA!
                </h1>

                <form id="form_login">

                    <label>E-mail:</label>

                    <div class="campo_login">

                        <span class="icone_login">👤</span>

                        <input id="email_input" type="email" placeholder="Insira seu e-mail">

                    </div>

                    <label>Senha:</label>

                    <div class="campo_login">

                        <span class="icone_login">🔒</span>

                        <input id="senha_input" type="password" placeholder="Insira sua senha">
                        <div id="div_mensagem_direcionamento"></div>

                    </div>

                    <div id="container_botao_login">

                        <button onclick="entrar()" type="button">
                            ENTRAR
                        </button>

                    </div>

                </form>

            </div>

        </section>

    </main>

</body>

</html>
<script>
    function entrar() {
        //aguardar();
        
        var emailVar = email_input.value;
        var senhaVar = senha_input.value;
        
        if (emailVar == "" || senhaVar == "") {
            cardErro.style.display = "block"
            mensagem_erro.innerHTML = "(Mensagem de erro para todos os campos em branco)";
            //finalizarAguardar();
            return false;
        }
        else {
           // setInterval(sumirMensagem, 5000)
        }
        
        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);
        
        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.idUsuario;
                    div_mensagem_direcionamento.innerHTML = '<p style="color:#E0C066"> Redirecionando em 1 segundo</p>'
                    setTimeout(function () {
                        div_mensagem_direcionamento.innerHTML = ""
                        window.location = "/painel.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    //finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

    
</script>
