<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Goldman:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <link rel="icon" href="assets/logo_codenexus_sem_fundo.png" type="image/png" />
    <link rel="stylesheet" href="./css/jogador.css" />
    <link rel="stylesheet" href="./css/userModal.css" />

    <title>CodeNexus</title>
</head>

<body>
    <div id="sidebar" class="sidebar">
        <div id="container_titulo">
            <img src="assets/logo_codenexus_sem_fundo.png" alt="" />
            <h2>CODENEXUS</h2>
        </div>
        <div id="container_opcoes">
            <div id="sub_container_painel">
                <span class="material-symbols-outlined">home</span>
                <a href="painel.html" id="sub_container_painel_a">PAINEL</a>
            </div>
            <div id="sub_container_perfil">
                <span class="material-symbols-outlined">person</span>
                <a href="jogador.html" id="sub_container_perfil_a">JOGADOR</a>
            </div>
            <div id="sub_container_partidas">
                <span class="material-symbols-outlined">contract</span>
                <a href="partidas.html" id="sub_container_partidas_a">PARTIDAS</a>
            </div>
            <div id="sub_container_forum">
                <span class="material-symbols-outlined">forum</span>
                <a href="forum.html" id="sub_container_forum_a">FÓRUM</a>
            </div>
        </div>

        <!-- <div id="container_sair">
            <div id="sub_container_sair">
                <span class="material-symbols-outlined">logout</span>
                <a href="index.html" id="sub_container_sair_a" onclick="sair()">SAIR</a>
            </div>
        </div> -->
    </div>

    <div id="container_principal">
        <div id="container_equipes">
            <div id="header_equipes">
                <span>EQUIPE</span>
                <div id="linha_header"></div>

                <div id="topo_direita">
                    <div id="container_user">
                        <span id="userLetra" class="user_letra"></span>
                    </div>
                    <button id="btn_cadastrar" onclick="abrirCadastroNovo()">
                        CADASTRAR +
                    </button>
                </div>

                <div id="lista_equipes"></div>

                <!-- MODAL PERFIL -->
                <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

                <div id="modalPerfil">
                    <div id="boxPerfil">
                        <span id="fecharModal" onclick="fecharPerfil()">close</span>

                        <span>PERFIL DO JOGADOR</span>

                        <div id="linha_perfil"></div>

                        <!-- TOPO PERFIL -->
                        <div id="topo_perfil">
                            <span class="material-symbols-outlined avatar_modal">person</span>

                            <div>
                                <h2 id="nomeJogador">Nome</h2>
                                <p id="funcaoJogador">Função</p>
                            </div>
                        </div>

                        <!-- CARDS -->
                        <div id="cardsPerfil">
                            <div class="card_status">
                                <p>VITÓRIAS</p>
                                <h1 id="kpiVitorias">0</h1>
                            </div>

                            <div class="card_status">
                                <p>DERROTAS</p>
                                <h1 id="kpiDerrotas">0</h1>
                            </div>

                            <div class="card_status">
                                <p>KDA</p>
                                <h1 id="kpiKda">0</h1>
                            </div>

                            <div class="card_status">
                                <p>WINRATE</p>
                                <h1 id="kpiWinrate">0%</h1>
                            </div>
                        </div>

                        <!-- GRAFICOS -->
                        <div id="graficosPerfil">
                            <div class="boxGrafico">
                                <h4>VITÓRIAS POR MÊS:</h4>
                                <canvas id="graficoLinha"></canvas>
                            </div>

                            <div class="boxGrafico">
                                <h4>CHAMPIONS MAIS PICKADOS:</h4>
                                <canvas id="graficoBarra"></canvas>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- MODAL CADASTRO -->
                <div id="modalCadastro">
                    <div id="boxCadastro">
                        <div id="topoCadastro">
                            <span>EQUIPE | CADASTRO</span>

                            <div id="acoesCadastro">
                                <button id="btnEnviarCadastro" onclick="salvarJogador()">
                                    CONCLUIR
                                </button>
                                <span id="fecharCadastro" onclick="fecharCadastro()">close</span>
                            </div>
                        </div>

                        <div id="linhaCadastro"></div>

                        <div id="gridCadastro">
                            <div class="campo">
                                <label>NOME:</label>
                                <input id="input_nome" type="text" placeholder="Insira o nome" />
                            </div>

                            <div class="campo">
                                <label>NICKNAME:</label>
                                <input id="input_nickname" type="text" placeholder="Insira o nickname" />
                            </div>

                            <div class="campo">
                                <label>EMAIL:</label>
                                <input id="input_email" type="text" placeholder="Insira o email" />
                            </div>

                            <div class="campo">
                                <label>CARGO:</label>
                                <select id="select_cargo">
                                    <option value="">Selecione uma opção</option>
                                    <option>Dev</option>
                                    <option>Suporte</option>
                                    <option>Treinador</option>
                                    <option>Jogador</option>
                                </select>
                            </div>

                            <div class="campo">
                                <label>TELEFONE:</label>
                                <input id="input_telefone" type="text" placeholder="-----------" />
                            </div>

                            <div class="campo">
                                <label>PAÍS:</label>
                                <select id="select_pais">
                                    <option value="">Selecione uma opção</option>
                                    <option>Brasil</option>
                                    <option>Coreia do Sul</option>
                                    <option>China</option>
                                    <option>Estados Unidos</option>
                                    <option>Canadá</option>
                                    <option>Alemanha</option>
                                    <option>França</option>
                                    <option>Espanha</option>
                                    <option>Reino Unido</option>
                                    <option>Dinamarca</option>
                                    <option>Suécia</option>
                                    <option>Polônia</option>
                                    <option>Turquia</option>
                                    <option>Japão</option>
                                    <option>Vietnã</option>
                                    <option>Taiwan</option>
                                    <option>Hong Kong</option>
                                    <option>Austrália</option>
                                    <option>Argentina</option>
                                    <option>Chile</option>
                                    <option>México</option>
                                    <option>Peru</option>
                                </select>
                            </div>

                            <div class="campo">
                                <label>SENHA:</label>
                                <input id="input_senha" type="password" placeholder="Insira a senha" />
                            </div>

                            <div class="campo">
                                <label>FUNÇÃO:</label>
                                <select id="select_funcao">
                                    <option value="">Selecione uma opção</option>
                                    <option>Top</option>
                                    <option>Mid</option>
                                    <option>Jungle</option>
                                    <option>Sup</option>
                                    <option>ADC</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>


            </div>
        </div>
    </div>
</body>

</html>
<script>
    var idEditando = null;
    var idUsuarioEdicao = null;

    function iconeLetra() {
        var nome = sessionStorage.nome;
        document.getElementById("userLetra").innerHTML = nome.charAt(0).toUpperCase();
    };

   var idEditando = null;

function concluir() {

    var varNome = input_nome.value;
    var varNickname = input_nickname.value;
    var varEmail = input_email.value;
    var varCargo = select_cargo.value;
    var varTelefone = input_telefone.value;
    var varPais = select_pais.value;
    var varSenha = input_senha.value;
    var varFuncao = select_funcao.value;
    var varfkEquipe = sessionStorage.fkEquipe;

    if (
        varNome == "" ||
        varNickname == "" ||
        varEmail == "" ||
        varCargo == "" ||
        varTelefone == "" ||
        varPais == "" ||
        varSenha == "" ||
        varFuncao == ""
    ) {
        alert("Preencha todos os campos!");
        return;
    }

    // UPDATE
    if(idEditando != null){

        fetch(`/usuarios/atualizar/${idEditando}`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({

                serverNome: varNome,
                serverNickname: varNickname,
                serverEmail: varEmail,
                serverCargo: varCargo,
                serverTelefone: varTelefone,
                serverPais: varPais,
                serverSenha: varSenha,
                serverFuncao: varFuncao

            }),
        })
        .then(function (resposta) {

            if (resposta.ok) {

                alert("Jogador atualizado!");

                idEditando = null;

                btnEnviarCadastro.innerHTML = "CONCLUIR";

                fecharCadastro();

                listarJogadores();

            } else {

                throw "Erro ao atualizar jogador";

            }

        })
        .catch(function (erro) {

            console.log(erro);

        });

        return;
    }

    // CADASTRO
    fetch("/usuarios/cadastrar", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
        },
        body: JSON.stringify({

            serverNome: varNome,
            serverNickname: varNickname,
            serverEmail: varEmail,
            serverCargo: varCargo,
            serverTelefone: varTelefone,
            serverPais: varPais,
            serverSenha: varSenha,
            serverFuncao: varFuncao,
            serverFkEquipe: varfkEquipe,

        }),
    })
    .then(function (resposta) {

        console.log("resposta: ", resposta);

        if (resposta.ok) {

            alert("Jogador cadastrado!");

            fecharCadastro();

            listarJogadores();

        } else {

            throw "Houve um erro ao tentar realizar o cadastro!";

        }

    })
    .catch(function (erro) {

        console.log(`#ERRO: ${erro}`);

    });

}

    function abrirPerfil(idUsuario) {
    document.getElementById("modalPerfil").style.display = "flex";
    buscarPerfil(idUsuario);
    buscarKpis(idUsuario);
    buscarGraficoLinha(idUsuario);

}

    function fecharPerfil() {
        document.getElementById("modalPerfil").style.display = "none";
    }

    function abrirCadastro() {

    document.getElementById("modalCadastro").style.display = "flex";

}
function abrirCadastroNovo(){

    idEditando = null;

    limparCampos();

    btnEnviarCadastro.innerHTML = "CONCLUIR";

    document.getElementById("modalCadastro").style.display = "flex";

}

    function limparCampos(){

    input_nome.value = "";
    input_nickname.value = "";
    input_email.value = "";
    select_cargo.value = "";
    input_telefone.value = "";
    select_pais.value = "";
    input_senha.value = "";
    select_funcao.value = "";

}

    function fecharCadastro() {
        document.getElementById("modalCadastro").style.display = "none";
    }

    function criarGraficos() {
        if (window.grafico1) window.grafico1.destroy();
        if (window.grafico2) window.grafico2.destroy();

        const ctx1 = document.getElementById("graficoLinha");

        window.grafico1 = new Chart(ctx1, {
            type: "line",
            data: {
                labels: ["0", "1", "2", "3", "4"],
                datasets: [
                    {
                        data: [50, 190, 120, 210, 130],
                        borderColor: "#00ffff",
                        borderWidth: 2,
                        tension: 0,
                    },
                    {
                        data: [130, 40, 200, 220, 180],
                        borderColor: "#F2FF58",
                        borderWidth: 2,
                        tension: 0,
                    },
                ],
            },
            options: {
                plugins: { legend: { display: false } },
                responsive: true,
                scales: {
                    x: {
                        ticks: { color: "white" },
                        grid: { color: "rgba(255,255,255,0.3)" },
                    },
                    y: {
                        beginAtZero: true,
                        max: 250,
                        ticks: {
                            color: "white",
                            stepSize: 50,
                        },
                        grid: {
                            color: "rgba(255,255,255,0.3)",
                        },
                    },
                },
            },
        });

        const ctx2 = document.getElementById("graficoBarra");

        window.grafico2 = new Chart(ctx2, {
            type: "bar",
            data: {
                labels: ["0", "1", "2", "3", "4"],
                datasets: [
                    {
                        data: [350, 200, 850, 650, 980],
                        backgroundColor: "#f0b90b",
                    },
                ],
            },
            options: {
                plugins: { legend: { display: false } },
                responsive: true,
                scales: {
                    x: {
                        ticks: { color: "white" },
                        grid: { color: "rgba(255,255,255,0.3)" },
                    },
                    y: {
                        beginAtZero: true,
                        max: 1000,
                        ticks: {
                            color: "white",
                            stepSize: 250,
                        },
                        grid: {
                            color: "rgba(255,255,255,0.3)",
                        },
                    },
                },
            },
        });
    }

    function iconeLetra() {
        var nome = sessionStorage.nome;
        document.getElementById("userLetra").innerHTML = nome.charAt(0).toUpperCase();
    };

    document.addEventListener("DOMContentLoaded", function () {
        iconeLetra();
        listarJogadores();
        userModal();

    })


    function buscarKpis(idUsuario) {
        fetch(`/usuarios/buscarKpis/${idUsuario}`)
            .then(function (resposta) {
                if (resposta.ok) {
                    resposta.json()
                        .then(function (dados) {
                            console.log("KPIS:", dados);
                            kpiVitorias.innerHTML = dados.vitorias;
                            kpiDerrotas.innerHTML = dados.derrotas;
                            kpiKda.innerHTML = dados.kda;
                            kpiWinrate.innerHTML = dados.winrate + "%";
                        });
                } else {
                    console.log("Erro ao buscar KPIs");
                }
            })
            .catch(function (erro) {
                console.log("Erro na requisição:", erro);
            });

    }


    function listarJogadores() {
        var fkEquipe = sessionStorage.fkEquipe;
        fetch(`/usuarios/listarJogadores/${fkEquipe}`)
            .then(function (resposta) {
                resposta.json()
                    .then(function (jogadores) {
                        console.log(jogadores);
                        lista_equipes.innerHTML = "";
                        for (var i = 0; i < jogadores.length; i++) {
                            var jogador = jogadores[i];
                            lista_equipes.innerHTML += `
    <div class="item_equipe">

        <span class="numero">${i + 1}</span>

        <span class="material-symbols-outlined icone">
            person
        </span>

        <span class="nome"
            onclick="abrirPerfil(${jogador.idUsuario})">
            ${jogador.nome} / ${jogador.nickname}
        </span>

        <div class="divisor"></div>

        <span class="cargo_acoes">

    <span class="cargo">
        ${jogador.funcao}
    </span>

    <span
        class="material-symbols-outlined icone_acao"
        onclick="editarJogador(${jogador.idUsuario})">
        edit
    </span>

    <span
        class="material-symbols-outlined icone_acao delete"
        onclick="deletarJogador(${jogador.idUsuario})">
        delete
    </span>

</span>

    </div>
`;
                        }
                    });
            })
            .catch(function (erro) {
                console.log(erro);
            });
    }


    function buscarGraficoLinha(idUsuario) {
        var meses = [
            "",
            "Jan",
            "Fev",
            "Mar",
            "Abr",
            "Mai",
            "Jun",
            "Jul",
            "Ago",
            "Set",
            "Out",
            "Nov",
            "Dez"
        ];
        fetch(`/usuarios/graficoVitorias/${idUsuario}`)
            .then(function (resposta) {
                if (resposta.ok) {
                    resposta.json()
                        .then(function (dados) {
                            console.log("GRAFICO:", dados);
                            var labels = [];
                            var valores = [];
                            for (var i = 0; i < dados.length; i++) {
                                labels.push(meses[dados[i].mes]);
                                valores.push(dados[i].vitorias);
                            }
                            criarGraficoLinha(labels, valores);
                        });
                }
            })
            .catch(function (erro) {
                console.log(erro);
            });

    }

    function criarGraficoLinha(labels, valores) {
        if (window.grafico1) {
            window.grafico1.destroy();
        }
        const ctx1 = document.getElementById("graficoLinha");
        window.grafico1 = new Chart(ctx1, {
            type: "line",
            data: {
                labels: labels,
                datasets: [
                    {
                        data: valores,
                        borderColor: "#00ffff",
                        borderWidth: 2,
                        tension: 0
                    }
                ]
            },

            options: {
                plugins: {
                    legend: {
                        display: false
                    }
                },

                responsive: true,

                scales: {
                    x: {
                        ticks: {
                            color: "white"
                        },
                        grid: {
                            color: "rgba(255,255,255,0.3)"
                        }
                    },

                    y: {
                        beginAtZero: true,

                        ticks: {
                            color: "white"
                        },

                        grid: {
                            color: "rgba(255,255,255,0.3)"
                        }
                    }
                }
            }
        });
    }

    function buscarPerfil(idUsuario){
    fetch(`/usuarios/buscarPerfil/${idUsuario}`)
    .then(function(resposta){
        if(resposta.ok){
            resposta.json()
            .then(function(dados){
                console.log("PERFIL:", dados);
                nomeJogador.innerHTML =
                    `${dados.nome} / ${dados.nickname}`;
                funcaoJogador.innerHTML =
                    `${dados.funcao}`;
            });
        }
    })
    .catch(function(erro){
        console.log(erro);
    });
}

    function deletarJogador(idUsuario){
    var confirmar = confirm("Deseja deletar este jogador?");
    if(confirmar == false){
        return;
    }
    fetch(`/usuarios/deletar/${idUsuario}`, {
        method: "DELETE"
    })
    .then(function(resposta){
        if(resposta.ok){
            alert("Jogador deletado com sucesso!");
            listarJogadores();
        } else {
            alert("Erro ao deletar jogador");
        }
    })
    .catch(function(erro){
        console.log(erro);
    });
}

    function salvarJogador(){
    if(idUsuarioEdicao == null){
        concluir();
    } else {
        atualizarJogador();
    }

}

    function editarJogador(idUsuario){

    idEditando = idUsuario;

    fetch(`/usuarios/buscarPerfil/${idUsuario}`)
    .then(function(resposta){

        if(resposta.ok){

            resposta.json()
            .then(function(dados){

                input_nome.value = dados.nome;
                input_nickname.value = dados.nickname;
                input_email.value = dados.email;
                select_cargo.value = dados.cargo;
                input_telefone.value = dados.telefone;
                select_pais.value = dados.pais;
                input_senha.value = dados.senha;
                select_funcao.value = dados.funcao;

                btnEnviarCadastro.innerHTML =
                    "SALVAR ALTERAÇÕES";

                abrirCadastro();

            });

        }

    });

}


</script>
<script src="./js/userModal.js"></script>
