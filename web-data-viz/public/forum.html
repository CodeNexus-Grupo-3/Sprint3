<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Goldman:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <link rel="icon" href="assets/logo_codenexus_sem_fundo.png" type="image/png">
    <link rel="stylesheet" href="./css/forum.css">
    <link rel="stylesheet" href="./css/userModal.css">
    <title>CodeNexus</title>

</head>
<body>
    <div id="sidebar" class="sidebar">
        <div id="container_titulo">
            <img src="assets/logo_codenexus_sem_fundo.png" alt="">
            <h2>CODENEXUS</h2>
        </div>
        <div id="container_opcoes">
            <div id="sub_container_painel">
                <span class="material-symbols-outlined">home</span>
                <a href="painel.html" id="sub_container_painel_a">PAINEL</a>
            </div>
            <div id="sub_container_perfil">
                <span class="material-symbols-outlined">person</span>
                <a href="jogador.html" id="sub_container_perfil_a">JOGADOR</a>
            </div>
            <div id="sub_container_partidas">
                <span class="material-symbols-outlined">contract</span>
                <a href="partidas.html"id="sub_container_partidas_a">PARTIDAS</a>
            </div>
            <div id="sub_container_forum">
                <span class="material-symbols-outlined">forum</span>   
                <a href="forum.html" id="sub_container_forum_a">FÓRUM</a>
            </div>
        </div>

        <!-- <div id="container_sair">
            <div id="sub_container_sair">
                <span class="material-symbols-outlined">logout</span>
                <a href="index.html" id="sub_container_sair_a" onclick="sair()">SAIR</a>
            </div>
        </div> -->
    </div>

    <div id="container_principal">
      
    <div class="forum_topo_pai">  
        <div id="forum_topo">
            <span class="title">SALA DE TREINAMENTO</span>
            <!-- <h2 class="title">SALA DE TREINAMENTO</h2> -->
            <div id="container_user"></div>
        </div>
    </div>  

    <!-- area da postagem no forum-->
    <div id="area_postagem">

        <div id="post_input">
            <span class="material-symbols-outlined">account_circle</span>

            <div id="campo_post">
                <textarea id="mensagem" placeholder="O que você quer dizer?"></textarea>
                <div id="acoes_post">
                    <!-- <div>
                        <span class="material-symbols-outlined">image</span>
                        <span class="material-symbols-outlined">attach_file</span>
                    </div> -->

                    <button onclick="postarMensagem()">POSTAR</button>
                </div>
            </div>
        </div>

    </div>

    <!-- a lista de todos os posts que for feito -->
    <div id="lista_posts">

        <div class="post">
            <span class="material-symbols-outlined">account_circle</span>

            <div class="conteudo_post">
                <h3>TREINADOR</h3>
                <p>
                    @jogador, aqui está a estratégia que discutimos antes!
                </p>

                <div class="imagens_post">
                    <div class="img_fake"></div>
                    <div class="img_fake"></div>
                </div>
            </div>
        </div>

    </div>

    </div>
</body>
</html>


<script>
function iconeLetra(){
    console.log("carregou function iconeLetra()")

    var nome = sessionStorage.nome;

    document.getElementById("container_user")
    .innerHTML = nome.charAt(0).toUpperCase();
};

function sair() {
    sessionStorage.clear();
    window.location = "index.html";
}

function postarMensagem(){

     console.log("fkUsuario:", sessionStorage.fkUsuario);

    var mensagem = document.getElementById("mensagem").value;

    if(mensagem.trim() == ""){
        alert("Digite uma mensagem!");
        return;
    }

    fetch("/forum/postar", {
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            titulo:"Postagem",
            conteudo:mensagem,
            fkUsuario: sessionStorage.fkUsuario
        })
    })
    .then(function(resposta){

        if(resposta.ok){

            listarPosts();

            document.getElementById("mensagem").value = "";

        }

    })
    .catch(function(erro){
        console.log(erro);
    });

}

function listarPosts(){

    fetch("/forum/listar")
    .then(function(resposta){
        return resposta.json();
    })
    .then(function(posts){

        document.getElementById("lista_posts").innerHTML = "";

        for(var i = 0; i < posts.length; i++){

            var post = posts[i];

            document.getElementById("lista_posts").innerHTML += `

            <div class="post">

                <span class="material-symbols-outlined">
                account_circle
                </span>

                <div class="conteudo_post">

                    <h3>${post.nickname}</h3>

                    <p>${post.conteudo}</p>

                    <div class="acoes_postagem">

                        <div style="display:flex; align-items:center; gap:5px;">

                            <span class="material-symbols-outlined botao_like"
                            onclick="curtirPost(${post.idPostagensForum}, this)">
                            favorite
                            </span>

                            <span id="likes-${post.idPostagensForum}">
                            ${post.likes}
                            </span>

                        </div>

                        ${
                            post.fkUsuario == sessionStorage.fkUsuario
                            ?
                            `
                            <div style="display:flex; gap:10px;">

                                <span 
                                class="material-symbols-outlined"
                                style="cursor:pointer; font-size:22px;"
                                onclick="editarPost(
                                    ${post.idPostagensForum},
                                    \`${post.conteudo}\`
                                )">
                                edit
                                </span>

                                <span 
                                class="material-symbols-outlined"
                                style="cursor:pointer; font-size:22px;"
                                onclick="deletarPost(${post.idPostagensForum})">
                                delete
                                </span>

                            </div>
                            `
                            :
                            ""
                        }

                    </div>

                </div>

            </div>

            `;
        }

    });
}

function curtirPost(id, elemento){

    if(elemento.classList.contains("ativo")){
        return;
    }

    fetch(`/forum/curtir/${id}`, {
        method:"PUT"
    })
    .then(function(){

        var contador = document.getElementById("likes-" + id);

        var likes = parseInt(contador.innerText);

        if(elemento.classList.contains("ativo")){
            return;
        }

        likes++;

        contador.innerText = likes;

        elemento.classList.add("ativo");

    });

};

function deletarPost(idPost){

    var confirmar = confirm(
        "Deseja deletar esta postagem?"
    );

    if(confirmar == false){
        return;
    }

    fetch(`/forum/deletar/${idPost}`, {
        method:"DELETE"
    })
    .then(function(resposta){

        if(resposta.ok){
            listarPosts();
        }

    })
    .catch(function(erro){
        console.log(erro);
    });

}

function editarPost(idPost, conteudoAtual){

    var novoConteudo = prompt(
        "Editar postagem:",
        conteudoAtual
    );

    if(novoConteudo == null || novoConteudo.trim() == ""){
        return;
    }

    fetch(`/forum/editar/${idPost}`, {
        method:"PUT",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            conteudo: novoConteudo
        })
    })
    .then(function(resposta){

        if(resposta.ok){
            listarPosts();
        }

    })
    .catch(function(erro){
        console.log(erro);
    });

}

function validarCargo(){

    if(sessionStorage.cargo === 'Jogador'){

      document.getElementById("area_postagem")
      .style.display = "none";

    };

}

document.addEventListener("DOMContentLoaded", function(){

    listarPosts();
    validarCargo();
    iconeLetra();
    userModal();

});
</script>
<script src="./js/userModal.js"></script>
